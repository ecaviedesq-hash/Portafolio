<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portafolio - Contáctate</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <!-- Encabezado -->
  <header class="header">
    <h1>PORTAFOLIO</h1>
  </header>

  <!-- Sección contacto -->
  <main class="container">
    <section class="contact-card">
      <h2>CONTÁCTATE</h2>
      <p class="subtitle">Escríbeme y trabajemos juntos</p>

      <form>
        <input type="text" placeholder="Nombre completo">
        <input type="email" placeholder="Correo electrónico">
        <input type="text" placeholder="Asunto">
        <textarea placeholder="Mensaje"></textarea>

        <button type="submit">Enviar Mensaje</button>
      </form>

      <div class="email">
        ✉️ ecaviedesq@gmail.com
      </div>
    </section>
  </main>

</body>
</html>
